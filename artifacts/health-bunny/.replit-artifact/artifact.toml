kind = "web"
previewPath = "/"
title = "Health Bunny AI"
version = "1.0.0"
id = "artifacts/health-bunny"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21141

[services.development]
run = "pnpm --filter @workspace/health-bunny run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/health-bunny", "run", "build" ]
publicDir = "artifacts/health-bunny/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21141"
BASE_PATH = "/"
